<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteAI Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3248;
      --accent:    #6c63ff;
      --accent-h:  #8b84ff;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #e8eaf0;
      --text-dim:  #8b8fa8;
      --text-dimmer: #555870;
      --radius:    10px;
      --chat-w:    340px;
      --top-h:     52px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Topbar ── */
    #topbar {
      height: var(--top-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }

    #logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    #logo svg { flex-shrink: 0; }

    #topbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    #client-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px 3px 6px;
      font-size: 13px;
      font-weight: 500;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.loading { background: var(--yellow); }
    #status-dot.error   { background: var(--red); }

    #credits-display {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #credits-display span {
      color: var(--text);
      font-weight: 500;
    }

    #publish-btn {
      margin-left: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    #publish-btn:hover { background: var(--accent-h); }
    #publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Main Layout ── */
    #main {
      display: flex;
      height: calc(100vh - var(--top-h));
      margin-top: var(--top-h);
    }

    /* ── Chat Panel ── */
    #chat-panel {
      width: var(--chat-w);
      min-width: var(--chat-w);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 100%;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-dimmer);
      padding: 0 4px;
    }

    .msg-bubble {
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .msg.user .msg-label { text-align: right; }

    .msg.ai .msg-bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .msg.system .msg-bubble {
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      border: 1px dashed var(--border);
      text-align: center;
    }

    /* Typing indicator */
    .typing-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      padding: 11px 14px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: blink 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Suggestion Chips */
    #chips {
      padding: 0 14px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover {
      border-color: var(--accent);
      color: var(--accent-h);
      background: rgba(108,99,255,0.08);
    }

    /* Input Area */
    #input-area {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #input-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      line-height: 1.45;
      transition: border-color 0.15s;
      scrollbar-width: thin;
    }
    #user-input:focus { outline: none; border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-dimmer); }

    #send-btn {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    #send-btn:hover { background: var(--accent-h); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Preview Panel ── */
    #preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    #browser-chrome {
      height: 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
    }

    #browser-dots {
      display: flex;
      gap: 5px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .dot.red    { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }
    .dot.green  { background: #22c55e; }

    #url-bar {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      height: 24px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
    }
    #url-bar svg { flex-shrink: 0; }
    #url-bar-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #preview-iframe {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 9999;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: var(--green); }
    #toast.error   { border-color: var(--red); }
  </style>
</head>
<body>

<script>
  const PROXY_URL    = 'https://siteai-production.up.railway.app';

</script>

<!-- Topbar -->
<div id="topbar">
  <div id="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">

</div>

<script>
// ════════════════════════════════════
// State
// ════════════════════════════════════
let currentHTML  = '';
let pendingHTML  = '';
let chatHistory  = [];
let isLoading    = false;

// ════════════════════════════════════
// Init
// ════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('client-name-label').textContent = CLIENT_NAME;
  await loadSite();
  await loadStatus();
  addSystemMsg('Hallo! Ich bin Ihr KI-Website-Assistent. Beschreiben Sie, was Sie ändern möchten.');
});

// ════════════════════════════════════
// Load site HTML into iframe
// ════════════════════════════════════
async function loadSite() {
  try {
    const res = await fetch(SITE_URL);
    if (!res.ok) throw new Error('Seite nicht gefunden');
    const html = await res.text();
    currentHTML = html;
    updatePreview(html, SITE_URL);
  } catch (e) {
    // Demo-Fallback
    currentHTML = getDemoHTML();
    updatePreview(currentHTML, 'demo-vorschau');
    console.warn('Website nicht geladen, nutze Demo-Fallback:', e.message);
  }
}

// ════════════════════════════════════
// Load credit status
// ════════════════════════════════════
async function loadStatus() {
  try {
    const res = await fetch(`${PROXY_URL}/api/status`, {
      headers: { 'x-client-token': CLIENT_TOKEN }
    });
    const data = await res.json();
    if (res.ok) {
      updateCredits(data.credits);
      setStatusDot('ok');
    } else {
      setStatusDot('error');
      console.warn('Status-Fehler:', data.error);
    }
  } catch (e) {
    setStatusDot('error');
    console.warn('Proxy nicht erreichbar:', e.message);
  }
}

// ════════════════════════════════════
// Send Message
// ════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  addUserMsg(text);
  input.value = '';
  autoResize(input);
  setLoading(true);

  // Build messages array
  const systemPrompt = `Du bist ein professioneller Website-Editor.
Du bekommst den aktuellen HTML-Code einer Website und einen Änderungswunsch auf Deutsch.

Regeln:
- Gib NUR den vollständigen, geänderten HTML-Code zurück – nichts anderes.
- Schreibe als erste Zeile einen HTML-Kommentar: <!-- ✅ [kurze Bestätigung der Änderung auf Deutsch] -->
- Behalte alle vorhandenen Styles, Inhalte und Strukturen bei, außer was explizit geändert werden soll.
- Kein Markdown, keine Erklärungen, nur reines HTML.

Aktueller HTML-Code:
\`\`\`html
${currentHTML}
\`\`\``;

  chatHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch(`${PROXY_URL}/api/chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-client-token': CLIENT_TOKEN
      },
      body: JSON.stringify({
        messages: chatHistory,
        system: systemPrompt
      })
    });

    const data = await res.json();

    if (!res.ok) {
      if (res.status === 402) {
        // No credits
        removeTyping();
        addSystemMsg('⚠️ Ihr Guthaben ist aufgebraucht. Bitte kontaktieren Sie uns für eine Aufladung.');
        updateCredits(0);
      } else {
        throw new Error(data.error || `Fehler ${res.status}`);
      }
      setLoading(false);
      return;
    }

    const rawContent = data.content?.[0]?.text || '';

    // Update credits
    if (typeof data._credits_remaining === 'number') {
      updateCredits(data._credits_remaining);
    }

    // Extract HTML
    const html = extractHTML(rawContent);
    if (!html) throw new Error('Keine gültige HTML-Antwort erhalten.');

    // Extract confirmation comment
    const confirmMatch = html.match(/<!--\s*✅\s*(.+?)\s*-->/);
    const confirmText = confirmMatch ? confirmMatch[1] : 'Änderung erfolgreich übernommen.';

    // Update state
    currentHTML = html;
    pendingHTML = html;
    updatePreview(html);

    // Add AI confirmation to chat
    chatHistory.push({ role: 'assistant', content: confirmText });
    removeTyping();
    addAIMsg(confirmText);

    // Enable publish
    document.getElementById('publish-btn').disabled = false;

  } catch (err) {
    removeTyping();
    addAIMsg(`❌ Fehler: ${err.message}`);
    setStatusDot('error');
    console.error(err);
  }

  setLoading(false);
}

// ════════════════════════════════════
// Publish
// ════════════════════════════════════
document.getElementById('publish-btn').addEventListener('click', () => {
  // In production: trigger FTP upload or save to server
  showToast('✅ Änderungen veröffentlicht!', 'success');
  document.getElementById('publish-btn').disabled = true;
  pendingHTML = '';
});

// ════════════════════════════════════
// Helpers
// ════════════════════════════════════
function extractHTML(raw) {
  // Try to find HTML between code fences first
  const fenceMatch = raw.match(/```(?:html)?\s*([\s\S]*?)```/i);
  if (fenceMatch) return fenceMatch[1].trim();
  // Otherwise check if raw starts with <!DOCTYPE or <html
  const trimmed = raw.trim();
  if (trimmed.startsWith('<!DOCTYPE') || trimmed.startsWith('<html') || trimmed.startsWith('<!--')) {
    return trimmed;
  }
  // Extract first block that looks like HTML
  const htmlMatch = trimmed.match(/(<!DOCTYPE[\s\S]*|<html[\s\S]*)/i);
  return htmlMatch ? htmlMatch[0].trim() : null;
}

function updatePreview(html, url) {
  const iframe = document.getElementById('preview-iframe');
  iframe.srcdoc = html;
  if (url) {
    document.getElementById('url-bar-text').textContent = url;
  }
}

function updateCredits(n) {
  const el = document.getElementById('credits-count');
  el.textContent = n;
  el.style.color = n <= 5 ? 'var(--red)' : n <= 15 ? 'var(--yellow)' : 'var(--text)';
}

function setStatusDot(state) {
  const dot = document.getElementById('status-dot');
  dot.className = '';
  if (state === 'loading') dot.classList.add('loading');
  if (state === 'error')   dot.classList.add('error');
}

function setLoading(on) {
  isLoading = on;
  document.getElementById('send-btn').disabled = on;
  document.getElementById('user-input').disabled = on;
  setStatusDot(on ? 'loading' : 'ok');
  if (on) addTypingIndicator();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function useChip(btn) {
  const input = document.getElementById('user-input');
  input.value = btn.textContent;
  autoResize(input);
  input.focus();
}

// ════════════════════════════════════
// Chat UI
// ════════════════════════════════════
function addUserMsg(text) {
  addMsg('user', 'Sie', text);
}
function addAIMsg(text) {
  addMsg('ai', 'SiteAI', text);
}
function addSystemMsg(text) {
  addMsg('system', '', text);
}

function addMsg(role, label, text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    ${label ? `<div class="msg-label">${label}</div>` : ''}
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addTypingIndicator() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-label">SiteAI</div>
    <div class="typing-bubble">
      <span></span><span></span><span></span>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ════════════════════════════════════
// Toast
// ════════════════════════════════════
let toastTimer;
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = ''; }, 3000);
}

// ════════════════════════════════════
// Demo Fallback HTML (wenn site nicht geladen werden kann)
// ════════════════════════════════════
function getDemoHTML() {
  return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo GmbH</title>
<style>
  body { font-family: sans-serif; margin: 0; color: #1a1a2e; }
  nav  { background: #6c63ff; color: #fff; padding: 14px 32px; font-weight: 600; font-size: 18px; }
